spring:
  application:
    name: hrm
  profiles:
    active: dev
  jpa:
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:false}

hrm:
  mail:
    from: ${MAIL_FROM:noreply@hrm.raster.com}
  report:
    schedule:
      enabled: ${REPORT_SCHEDULE_ENABLED:true}

server:
  port: 8080
