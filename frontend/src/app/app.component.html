<div class="shell" [class.collapsed]="sidebarCollapsed && !isMobile">
  <!-- Backdrop -->
  @if (mobileMenuOpen) {
    <div class="backdrop" (click)="mobileMenuOpen = false"></div>
  }

  <!-- Sidebar -->
  <aside class="sidebar" [class.open]="mobileMenuOpen">
    <div class="sidebar-head">
      <div class="logo">
        <div class="logo-mark">
          <span>H</span>
        </div>
        <div class="logo-text">
          <span class="logo-name">HRM</span>
          <span class="logo-badge">Pro</span>
        </div>
      </div>
    </div>

    <nav class="sidebar-body">
      @for (group of navGroups; track group.label) {
        <div class="nav-group">
          <span class="nav-group-title">{{ group.label }}</span>
          @for (item of group.items; track item.path) {
            <a class="nav-item"
               [routerLink]="item.path"
               routerLinkActive="nav-item--active"
               [matTooltip]="sidebarCollapsed && !isMobile ? item.label : ''"
               matTooltipPosition="right"
               (click)="onNavClick()">
              <mat-icon class="nav-item-icon">{{ item.icon }}</mat-icon>
              <span class="nav-item-text">{{ item.label }}</span>
            </a>
          }
        </div>
      }
    </nav>

    <div class="sidebar-foot">
      @if (!isMobile) {
        <button class="sidebar-collapse" (click)="toggleSidebar()"
                [matTooltip]="sidebarCollapsed ? 'Expand' : ''"
                matTooltipPosition="right">
          <mat-icon>{{ sidebarCollapsed ? 'keyboard_double_arrow_right' : 'keyboard_double_arrow_left' }}</mat-icon>
          <span class="collapse-text">Collapse</span>
        </button>
      }
      <div class="user-block">
        <div class="user-avatar">
          <span>AU</span>
        </div>
        <div class="user-meta">
          <span class="user-name">Admin User</span>
          <span class="user-role">Administrator</span>
        </div>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <div class="main">
    <div class="topbar-accent"></div>
    <header class="topbar">
      <div class="topbar-left">
        @if (isMobile) {
          <button mat-icon-button class="menu-trigger" (click)="mobileMenuOpen = !mobileMenuOpen">
            <mat-icon>{{ mobileMenuOpen ? 'close' : 'menu' }}</mat-icon>
          </button>
        }
        <div class="breadcrumb">
          <span class="breadcrumb-item">{{ title }}</span>
        </div>
      </div>
      <div class="topbar-right">
        <div class="topbar-search">
          <mat-icon class="topbar-search-icon">search</mat-icon>
          <input class="topbar-search-input" type="text" placeholder="Search..." />
          <span class="search-shortcut">⌘K</span>
        </div>
        <div class="topbar-actions">
          <button mat-icon-button class="topbar-btn theme-toggle"
                  (click)="themeService.toggle()"
                  [matTooltip]="(themeService.isDark$ | async) ? 'Light mode' : 'Dark mode'">
            <mat-icon>{{ (themeService.isDark$ | async) ? 'light_mode' : 'dark_mode' }}</mat-icon>
          </button>
          <button mat-icon-button class="topbar-btn" matTooltip="Notifications">
            <mat-icon>notifications_none</mat-icon>
            <span class="notif-dot"></span>
          </button>
        </div>
      </div>
    </header>
    <main class="page-content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
