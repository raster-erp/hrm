<mat-sidenav-container class="app-container">
  <mat-sidenav #sidenav [mode]="sidenavMode" [opened]="sidenavOpened"
               class="app-sidenav" (closedStart)="sidenavOpened = false">
    <div class="sidenav-brand">
      <div class="brand-logo">
        <mat-icon>hub</mat-icon>
      </div>
      <div class="brand-text">
        <span class="brand-title">OneHealth</span>
        <span class="brand-subtitle">HR Management</span>
      </div>
    </div>

    <div class="sidenav-nav">
      @for (group of navGroups; track group.label; let i = $index) {
        <div class="nav-group">
          <div class="nav-group-label">{{ group.label }}</div>
          <mat-nav-list dense>
            @for (item of group.items; track item.path) {
              <a mat-list-item [routerLink]="item.path" routerLinkActive="active-link"
                 (click)="onNavClick()">
                <mat-icon matListItemIcon>{{ item.icon }}</mat-icon>
                <span matListItemTitle>{{ item.label }}</span>
              </a>
            }
          </mat-nav-list>
        </div>
      }
    </div>
  </mat-sidenav>

  <mat-sidenav-content class="app-content">
    <mat-toolbar class="app-toolbar">
      <button mat-icon-button class="menu-button" (click)="sidenav.toggle()"
              aria-label="Toggle navigation">
        <mat-icon>menu</mat-icon>
      </button>
      <span class="toolbar-title">{{ title }}</span>
      <span class="toolbar-spacer"></span>
      <button mat-icon-button aria-label="Notifications" class="toolbar-action">
        <mat-icon>notifications_none</mat-icon>
      </button>
      <div class="user-avatar">
        <mat-icon>account_circle</mat-icon>
      </div>
    </mat-toolbar>
    <main class="content-area">
      <router-outlet></router-outlet>
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
