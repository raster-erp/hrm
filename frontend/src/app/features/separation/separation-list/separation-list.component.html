<div class="separation-list">
  <div class="page-header">
    <h2>Separations</h2>
    <button mat-raised-button color="primary" (click)="createNew()">
      <mat-icon>add</mat-icon> New Separation
    </button>
  </div>

  @if (loading) {
    <div class="loading-container">
      <mat-spinner diameter="40"></mat-spinner>
    </div>
  } @else if (separations.length === 0) {
    <div class="no-data">
      <mat-icon>exit_to_app</mat-icon>
      <p>No separation records found</p>
    </div>
  } @else {
    <div class="table-container">
      <table mat-table [dataSource]="separations" class="full-width">
        <ng-container matColumnDef="employeeName">
          <th mat-header-cell *matHeaderCellDef>Employee</th>
          <td mat-cell *matCellDef="let row">
            <span class="data-link" (click)="viewDetail(row)">{{ row.employeeName }}</span>
          </td>
        </ng-container>

        <ng-container matColumnDef="separationType">
          <th mat-header-cell *matHeaderCellDef>Type</th>
          <td mat-cell *matCellDef="let row">{{ row.separationType }}</td>
        </ng-container>

        <ng-container matColumnDef="noticeDate">
          <th mat-header-cell *matHeaderCellDef>Notice Date</th>
          <td mat-cell *matCellDef="let row">{{ row.noticeDate }}</td>
        </ng-container>

        <ng-container matColumnDef="lastWorkingDay">
          <th mat-header-cell *matHeaderCellDef>Last Working Day</th>
          <td mat-cell *matCellDef="let row">{{ row.lastWorkingDay }}</td>
        </ng-container>

        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef>Status</th>
          <td mat-cell *matCellDef="let row">
            <span class="status-chip" [class]="'status-' + row.status.toLowerCase()">
              {{ row.status }}
            </span>
          </td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Actions</th>
          <td mat-cell *matCellDef="let row">
            <button mat-icon-button (click)="viewDetail(row)" matTooltip="View details">
              <mat-icon>visibility</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="clickable-row"></tr>
      </table>
    </div>

    <mat-paginator
      [length]="totalElements"
      [pageSize]="pageSize"
      [pageSizeOptions]="[5, 10, 25]"
      (page)="onPage($event)"
      showFirstLastButtons>
    </mat-paginator>
  }
</div>
