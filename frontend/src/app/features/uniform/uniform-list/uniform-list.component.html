<div class="uniform-list-container">
  <mat-card>
    <mat-card-header>
      <mat-card-title>
        <div class="header-row">
          <h2>Uniform Catalog</h2>
          <div class="header-actions">
            <button mat-stroked-button color="primary" (click)="goToAllocations()">
              <mat-icon>assignment</mat-icon>
              Allocations
            </button>
            <button mat-raised-button color="primary" (click)="openFormDialog()">
              <mat-icon>add</mat-icon>
              Add Uniform
            </button>
          </div>
        </div>
      </mat-card-title>
    </mat-card-header>

    <mat-card-content>
      @if (loading) {
        <div class="loading-container">
          <mat-spinner diameter="48"></mat-spinner>
        </div>
      }

      <div class="table-container">
        <table mat-table [dataSource]="dataSource" class="full-width">
          <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef>Name</th>
            <td mat-cell *matCellDef="let u">{{ u.name }}</td>
          </ng-container>

          <ng-container matColumnDef="type">
            <th mat-header-cell *matHeaderCellDef>Type</th>
            <td mat-cell *matCellDef="let u">{{ u.type }}</td>
          </ng-container>

          <ng-container matColumnDef="size">
            <th mat-header-cell *matHeaderCellDef>Size</th>
            <td mat-cell *matCellDef="let u">{{ u.size }}</td>
          </ng-container>

          <ng-container matColumnDef="description">
            <th mat-header-cell *matHeaderCellDef>Description</th>
            <td mat-cell *matCellDef="let u">{{ u.description || '—' }}</td>
          </ng-container>

          <ng-container matColumnDef="active">
            <th mat-header-cell *matHeaderCellDef>Status</th>
            <td mat-cell *matCellDef="let u">
              <span class="status-chip" [class]="u.active ? 'status-active' : 'status-inactive'">
                {{ u.active ? 'Active' : 'Inactive' }}
              </span>
            </td>
          </ng-container>

          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef>Actions</th>
            <td mat-cell *matCellDef="let u">
              <button mat-icon-button color="primary" matTooltip="Edit"
                      (click)="openFormDialog(u); $event.stopPropagation()">
                <mat-icon>edit</mat-icon>
              </button>
              <button mat-icon-button color="warn" matTooltip="Delete"
                      (click)="deleteUniform(u); $event.stopPropagation()">
                <mat-icon>delete</mat-icon>
              </button>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>

        @if (!loading && dataSource.data.length === 0) {
          <div class="no-data">
            <mat-icon>checkroom</mat-icon>
            <p>No uniforms found</p>
          </div>
        }
      </div>
    </mat-card-content>
  </mat-card>
</div>
